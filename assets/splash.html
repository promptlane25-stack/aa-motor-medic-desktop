<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AA Motor Medic</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #0d1f4a 0%, #1e3a6e 55%, #2a5caa 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    user-select: none;
    -webkit-app-region: drag;
  }

  .inner {
    text-align: center;
    color: #fff;
  }

  .logo-ring {
    width: 80px; height: 80px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .logo-ring img {
    width: 52px; height: 52px;
    object-fit: contain;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: #fff;
    margin-bottom: 4px;
  }

  p {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.4px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.85);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="inner">
    <div class="logo-ring">
      <!-- inline the icon so it works from file:// without a server -->
      <img src="../assets/icon.png" alt="AA Motor Medic" />
    </div>
    <h1>AA Motor Medic</h1>
    <p>Staff Booking System</p>
    <div class="spinner"></div>
    <div class="loading-text">Loading booking system…</div>
  </div>
</body>
</html>
